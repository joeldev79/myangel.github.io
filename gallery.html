<script src="bootstrap.js"></script>
<script>
    const items = document.querySelectorAll('.roundabout .item');
    let angle = 0;
    const total = items.length;
    const radius = 250;

    function updatePositions() {
        items.forEach((item, i) => {
            const offset = ((360 / total) * i + angle) % 360;
            const rad = offset * (Math.PI / 180);

            const x = radius * Math.sin(rad);
            const z = radius * Math.cos(rad);

            const scale = 0.9 + 0.1 * Math.cos(rad);
            const opacity = 0.6 + 0.4 * Math.cos(rad);

            item.style.transform = `translateX(${x}px) translateZ(${z}px) scale(${scale})`;
            item.style.zIndex = Math.round(100 * Math.cos(rad));
            item.style.opacity = opacity;
        });
    }

    document.getElementById('next').addEventListener('click', () => {
        angle -= 360 / total;
        updatePositions();
    });

    document.getElementById('prev').addEventListener('click', () => {
        angle += 360 / total;
        updatePositions();
    });

    updatePositions();

</script>

<script>

    const videoItems = document.querySelectorAll('.roundabout-video .video-item');
    let videoAngle = 0;
    const videoTotal = videoItems.length;
    const videoRadius = 250;

    function updateVideoPositions() {

        videoItems.forEach((item, i) => {

            const offset = ((360 / videoTotal) * i + videoAngle) % 360;
            const rad = offset * (Math.PI / 180);

            const x = videoRadius * Math.sin(rad);
            const z = videoRadius * Math.cos(rad);

            const scale = 0.9 + 0.1 * Math.cos(rad);
            const opacity = 0.6 + 0.4 * Math.cos(rad);

            item.style.transform =
                `translateX(${x}px) translateZ(${z}px) scale(${scale})`;

            item.style.zIndex = Math.round(100 * Math.cos(rad));
            item.style.opacity = opacity;

        });

    }

    document.getElementById('video-next').onclick = () => {
        videoAngle -= 360 / videoTotal;
        updateVideoPositions();
    }

    document.getElementById('video-prev').onclick = () => {
        videoAngle += 360 / videoTotal;
        updateVideoPositions();
    }

    updateVideoPositions();

</script>
